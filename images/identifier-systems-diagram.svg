  <rect x="550" y="420" width="20" height="15" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="580" y="432" font-size="11" fill="#333">= Profile (uses identifier)</text>
  
  <text x="400" y="475" text-anchor="middle" font-size="12" fill="#999">Placeholder - Generate from images-source/identifier-systems.mmd</text>
