# Deploy workflow triggered after the build completes.
# This workflow now chains into ig-release.yml for unified versioned publishing.
# The actual deployment logic has been moved to ig-release.yml.

name: Deploy PH Core FHIR IG

on:
  workflow_run:
    workflows: ["Build PH Core FHIR IG"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if the build succeeded
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - name: Trigger IG Release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The ig-release.yml workflow listens for workflow_run events
          # and handles the actual deployment with versioning
          echo "Build succeeded. ig-release.yml will handle deployment with versioning."
          echo "Workflow run ID: ${{ github.event.workflow_run.id }}"
