# Deploy workflow triggered after the build completes.
# This runs in the base repo's trusted context so it has access to ACTIONS_DEPLOY_KEY.
# Fork PRs can now safely deploy because the untrusted build is isolated from the trusted deploy.

name: Deploy PH Core FHIR IG

on:
  workflow_run:
    workflows: ["Build PH Core FHIR IG"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if the build succeeded
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.event.workflow_run.id }} \
            --name ig-output \
            --dir ./output \
            --repo ${{ github.repository }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_branch: gh-pages
          publish_dir: ./output
          force_orphan: true
          commit_message: "Deploy IG - ${{ github.event.workflow_run.head_sha }}"
