name: Build PH Core FHIR IG

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          if echo "$BRANCH_NAME" | grep -q '/'; then
            echo "::error::Branch name contains '/'. Use hyphens instead."
            exit 1
          fi
          if echo "$BRANCH_NAME" | grep -qE '[\\~^:\[\] ]'; then
            echo "::error::Branch name contains invalid special characters."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          sudo gem install jekyll
          sudo npm install -g fsh-sushi

      - name: Build IG
        run: |
          chmod +x ./_updatePublisher.sh
          ./_updatePublisher.sh -y
          chmod +x ./_genonce.sh
          ./_genonce.sh

      # QA gate using jq (pre-installed on GitHub Actions Ubuntu runners)
      - name: QA Gate
        run: |
          if [ ! -f output/qa.json ]; then
            echo "::error::No qa.json found in output/. Failing for safety."
            exit 1
          fi

          # Extract error count using jq (clean and reliable)
          ERRORS=$(jq -r '.errs // 0' output/qa.json)

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::QA errors found: $ERRORS"
            exit 1
          fi
          echo "✅ QA passed: $ERRORS errors"

      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./output
          single_commit: true
          commit_message: "Deploy IG - ${{ github.sha }}"
