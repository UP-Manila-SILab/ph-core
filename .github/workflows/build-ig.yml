name: Build PH Core FHIR IG

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: hl7fhir/ig-publisher-base:latest
      options: --user root

    env:
      TX_SERVER: "http://tx.fhir.org"
      JAVA_MEMORY: "6g"

    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          if echo "$BRANCH_NAME" | grep -q '/'; then
            echo "::error::Branch name contains '/'. Use hyphens instead."
            exit 1
          fi
          if echo "$BRANCH_NAME" | grep -qE '[\\~^:\[\] ]'; then
            echo "::error::Branch name contains invalid special characters."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install Graphviz
        run: |
          apt-get update && apt-get install -y graphviz

      - name: Download IG Publisher
        run: |
          mkdir -p input-cache
          curl -fsSL \
            "https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar" \
            -o "input-cache/publisher.jar"

      - name: Install SUSHI
        run: |
          npm install -g fsh-sushi
          sushi --version

      - name: Run SUSHI
        run: sushi . --log-level debug

      - name: Build IG
        run: |
          java -Xmx${{ env.JAVA_MEMORY }} -jar input-cache/publisher.jar publisher \
            -ig . \
            -auto-ig-build \
            -tx ${{ env.TX_SERVER }}

      - name: QA Gate
        run: |
          if [ -f output/qa.json ]; then
            ERRORS=$(node -e "console.log(require('./output/qa.json').errs || 0)")
            if [ "$ERRORS" -gt 0 ]; then
              echo "::error::QA errors found: $ERRORS"
              exit 1
            fi
          fi

      - name: Fix output ownership
        if: ${{ !cancelled() }}
        run: chown -R $(id -u):$(id -g) ./output 2>/dev/null || true

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ig-output
          path: output/

      - name: Publish to GitHub Pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./output
          keep_files: false
          single_commit: true
          commit_message: "Deploy IG - ${{ github.sha }}"
